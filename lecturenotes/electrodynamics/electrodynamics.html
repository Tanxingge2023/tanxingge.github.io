<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../../logo.jpg" type="image/jpeg">
    <title>Electrodynamics Lecture-notes
    </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
    font-family: "Microsoft YaHei", Arial, sans-serif;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0;
    line-height: 1.7;
    color: #e2e8f0;
    /* 核心修改：你的背景图片，叠加深色遮罩保证文字清晰 */
    background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), url("../../bg2.jpg");
    /* 背景图片全屏适配 */
    background-size: cover;
    background-position: center center;
    background-attachment: fixed;
    background-repeat: no-repeat;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
}
        /* 内容容器：控制宽度，和全站一致 */
        .page-wrapper {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        /* 返回按钮：适配深空风格 */
        .back-btn {
            display: inline-block;
            margin: 20px 0 30px;
            padding: 10px 24px;
            background: rgba(15, 23, 42, 0.7);
            color: #60a5fa;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(96, 165, 250, 0.2);
            box-shadow: 0 4px 12px rgba(7, 14, 26, 0.2);
            backdrop-filter: blur(8px);
            position: relative;
            overflow: hidden;
        }
        /* 按钮光效 */
        .back-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 8px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(66, 153, 225, 0), rgba(96, 165, 250, 0.4), rgba(66, 153, 225, 0));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .back-btn:hover {
            transform: translateY(-4px);
            background: rgba(15, 23, 42, 0.9);
            color: #93c5fd;
            box-shadow: 0 8px 24px rgba(7, 14, 26, 0.3);
            border-color: rgba(96, 165, 250, 0.4);
        }
        .back-btn:hover::before {
            opacity: 1;
        }
        /* 详情容器：适配深空风格 */
        .detail-container {
            background: rgba(15, 23, 42, 0.7);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(7, 14, 26, 0.4);
            border: 1px solid rgba(96, 165, 250, 0.15);
            backdrop-filter: blur(8px);
        }
        .detail-container h1 {
            color: #60a5fa;
            font-size: 2rem;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 0 10px rgba(96, 165, 250, 0.2);
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(96, 165, 250, 0.2);
        }
        .detail-container img {
            max-width: 100%;
            max-height: 400px;
            display: block;
            margin: 0 auto 30px;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(96, 165, 250, 0.2);
            transition: transform 0.4s ease;
        }
        .detail-container img:hover {
            transform: scale(1.02);
        }
        .detail-container p {
            font-size: 1.1rem;
            color: #cbd5e1;
            line-height: 1.8;
            margin-bottom: 20px;
        }
        /* PDF下载按钮：适配深空风格 */
        .pdf-btn {
            display: inline-block;
            padding: 12px 30px;
            background: rgba(15, 23, 42, 0.8);
            color: #60a5fa;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(7, 14, 26, 0.2);
            border: 1px solid rgba(96, 165, 250, 0.2);
            backdrop-filter: blur(8px);
            position: relative;
            overflow: hidden;
        }
        /* PDF按钮光效 */
        .pdf-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 8px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(66, 153, 225, 0), rgba(96, 165, 250, 0.4), rgba(66, 153, 225, 0));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .pdf-btn:hover {
            transform: translateY(-4px);
            background: rgba(15, 23, 42, 0.95);
            color: #93c5fd;
            box-shadow: 0 8px 24px rgba(7, 14, 26, 0.3);
            border-color: rgba(96, 165, 250, 0.4);
        }
        .pdf-btn:hover::before {
            opacity: 1;
        }
        /* 响应式适配 */
        @media (max-width: 768px) {
            .page-wrapper {
                padding: 15px;
            }
            .detail-container {
                padding: 20px;
            }
            .detail-container h1 {
                font-size: 1.6rem;
            }
            .pdf-btn {
                padding: 10px 25px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <a href="../../lecturenotes/lecture-notes.html" class="back-btn">← Back</a>
        <div class="detail-container">
            <h1>Electrodynamics (Chinese)</h1>
            <img src="../../lecturenotes/electrodynamics/电动力学讲义封面.jpg" >
            <p>These lecture-notes covers:</p>
            <p>Mathematical fundamentals for electrodynamics<br>
               Maxwell equations<br>
               Electrostatics<br>
               Magnetostatics<br>
               Electromagnetic waves<br>
               <br>
               
            <a href="../../lecturenotes/electrodynamics/electrodynamics (I) .pdf" class="pdf-btn" target="_blank">PDF</a>
        </div>
                        <!-- 页脚 -->
        <footer class="footer">
            <p>© 2026 TanXG</p>
        </footer>
    </div>
</body>
</html>
